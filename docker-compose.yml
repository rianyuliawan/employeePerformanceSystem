services:
  postgres:
    image: postgres:16-alpine
    container_name: eps-postgres
    environment:
      POSTGRES_USER: eps
      POSTGRES_PASSWORD: eps_password
      POSTGRES_DB: employee_performance
    ports:
      - "5432:5432"
    volumes:
      - eps-postgres-data:/var/lib/postgresql/data
      - ./database/schema/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

volumes:
  eps-postgres-data:

